<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Register</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
    </head>
    <body>
        <main>
            <nav class = "navbar">
                <a class = "navhover" href="{{ url_for('about') }}">About</a>
                <a class = "navhover">Menu</a>
                <a class = "navhover" href="{{ url_for('cats') }}">Cats</a>
                <a class = "navhover">Reviews</a>
                <a class = "navhover" href="{{ url_for('login') }}">Sign In</a>
                <a class = "navhover">Contact</a>
            </nav>
            <section class = "title">
                <h1 class = "cattitle">Cat Cafe</h1>
                <h2 class = "logintitle">Register</h2>
            </section>
            <section class = "form">
                <form id = "formdata">
                    <label for = "name" class = "logintxt">Name</label><br>
                    <input type = "text" name = "name" class = "box" required placeholder = "Enter your name"><br>

                    <label for = "username" class = "logintxt">Username</label><br>
                    <input type = "text" name = "username" class = "box" required placeholder = "Enter a username"><br>
                    
                    <label for = "email" class = "logintxt">Email</label><br>
                    <input type = "text" id = "email" name = "email" class = "box"  required placeholder = "Enter your email"><br>

                    <label for = "password" class = "logintxt">Password</label><br>
                    <input type = "text" id = "password" name = "password" class = "box"  required placeholder = "Enter your password"><br>

                    <label for = "confirmpassword" class = "logintxt">Confirm Password</label><br>
                    <input type = "text" id = "confirmpassword" class = "box"  required placeholder = "Re-enter your password"><br>

                    <button type = "submit" class = "loginbtn">Register</button>
                    <label for = "confirmpassword" class = "registertext">Already have an account? Login </label><br>

                </form>
               
            </section>


            
        </section>
        </main>
    
        
        <script>
            const form = document.getElementById("formdata")
            form.addEventListener("submit", async function(register) {
                register.preventDefault()
                
                var password = document.getElementById("password").value;
                var passcheck = document.getElementById("confirmpassword").value;

                if (password != passcheck){
                    alert("Incorrect password entered");
                    return;
                }

                let registerData = new FormData(form)

                try{
                 await fetch ("/register_send", {
                    method: "POST",
                    body: registerData

                })

                window.location.href = "/login"
            } catch(err){
                alert(err)
            }
            })
        </script>
    </body>
</html>
