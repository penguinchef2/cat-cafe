<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Menu</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Outfit:wght@100..900&display=swap" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Hanuman:wght@100..900&family=Outfit:wght@100..900&display=swap" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com" rel="stylesheet" />

</head>

<body>
<!-- NAVBAR -->
    <nav class="navbar" style="position: relative; width: 100%">
        <a style="
          font-size: 28px;
          position: absolute;
          left: 0;
          font-weight: bold;
          font-family: Caprasimo, serif;
        ">Cat Cafe</a>
        <a class="navhover" style="font-family: Caprasimo, serif" href="{{ url_for('home') }}">Home</a>
        <a class="navhover" style="font-family: Caprasimo, serif" href="{{ url_for('about') }}">About</a>
        <a class="navhover" style="font-family: Caprasimo, serif" href="{{ url_for('cats') }}">Cats</a>
        <a class="navhover" style="font-family: Caprasimo, serif" href="{{ url_for('menu') }}">Menu</a>
        <a class="navhover" style="font-family: Caprasimo, serif" href="{{ url_for('reviews') }}">Reviews</a>
    </nav>

<div class="profile-wrapper">

    <!-- LEFT COLUMN -->
    <div class="left-col">
        <img class="cat-img" src="{{ url_for('static', filename='images/' + cat[10]) }}">

        <div class="card intro">
            <p>
                Hi there! My name is {{ cat[1] }} and I am a {{ cat[3] }}.
                {{ cat[4] }}
            </p>
        </div>
    </div>

    <!-- MIDDLE COLUMN -->
    <div class="card favorites">
        <h2>Favorites</h2>
        <p><strong>Toy:</strong> {{ cat[9] }}</p>
        <p><strong>Likes:</strong> {{ cat[6] }}</p>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="right-col">

        <div class="card about">
            <h2>About Me</h2>
            <p>{{ cat[8] }}</p>
        </div>

        <div class="card adopt">
            <h2>Adopt Me!</h2>
            <p>Click below to apply!</p>

            {% if cat[11] %}
                <button class="adopt-btn">Apply to Adopt Me!</button>
            {% else %}
                <button class="adopt-btn disabled">Not Available</button>
            {% endif %}
        </div>

    </div>

</div>

</body>
