<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Menu</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/menu.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Outfit:wght@100..900&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Hanuman:wght@100..900&family=Outfit:wght@100..900&display=swap"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com" rel="stylesheet" />
  </head>
  <body style="margin-bottom: 50px">
    <!-- NAVBAR -->
    <nav class="navbar" style="position: relative; width: 100%">
      <a
        style="
          font-size: 28px;
          position: absolute;
          left: 0;
          font-weight: bold;
          font-family: Caprasimo, serif;
        "
        >Cat Cafe</a
      >
      <a
        class="navhover"
        style="font-family: Caprasimo, serif"
        href="{{ url_for('home') }}"
        >Home</a
      >
      <a
        class="navhover"
        style="font-family: Caprasimo, serif"
        href="{{ url_for('about') }}"
        >About</a
      >
      <a
        class="navhover"
        style="font-family: Caprasimo, serif"
        href="{{ url_for('cats') }}"
        >Cats</a
      >
      <a
        class="navhover"
        style="font-family: Caprasimo, serif"
        href="{{ url_for('menu') }}"
        >Menu</a
      >
      <a
        class="navhover"
        style="font-family: Caprasimo, serif"
        href="{{ url_for('reviews') }}"
        >Reviews</a
      >
    </nav>

    <h1
      class="menu-title"
      style="font-family: Caprasimo, serif; font-weight: bold"
    >
      Menu
    </h1>
    <p class="menu-subtitle" style="font-family: Caprasimo, serif">
      DRINKS / ALL ITEMS
    </p>

    <div class="menu-container">
      <div id="menu-grid" class="menu-grid"></div>
    </div>

    <script>
      const menuItems = [
        {
          name: "Cafe Break",
          price: 5,
          img: "{{ url_for('static', filename='images/cafebreak.jpeg') }}",
        },
        {
          name: "Cafe Dessert",
          price: 4,
          img: "{{ url_for('static', filename='images/cafedessert.jpeg') }}",
        },
        {
          name: "Cafe Sandwich",
          price: 7,
          img: "{{ url_for('static', filename='images/cafesandwich.jpeg') }}",
        },
        {
          name: "Latte",
          price: 5,
          img: "{{ url_for('static', filename='images/latte.jpg') }}",
        },
        {
          name: "Croissant",
          price: 4,
          img: "{{ url_for('static', filename='images/croissant.png') }}",
        },
        {
          name: "Muffin",
          price: 3,
          img: "{{ url_for('static', filename='images/muffin.png') }}",
        },
        {
          name: "Tea",
          price: 3,
          img: "{{ url_for('static', filename='images/tea.png') }}",
        },
        {
          name: "Cake Pop",
          price: 2,
          img: "{{ url_for('static', filename='images/cakepop.png') }}",
        },
        {
          name: "Salad",
          price: 4,
          img: "{{ url_for('static', filename='images/salad.png') }}",
        },
      ];

      const container = document.getElementById("menu-grid");

      menuItems.forEach((item) => {
        const card = document.createElement("div");
        card.classList.add("menu-card");

        card.innerHTML = `
        <img src="${item.img}" alt="${item.name}">
        <h3>${item.name}</h3>
        <p>$${item.price}</p>
    `;

        container.appendChild(card);
      });
    </script>
  </body>
</html>
