<body>

<h1 class="menu-title">Menu</h1>
<p class="menu-subtitle">DRINKS / ALL ITEMS</p>

<div class="menu-container">
    <div id="menu-grid" class="menu-grid">
    </div>
</div>

<script>
const menuItems = [
    { name: "Cafe Break", price: 5, img: "../images/cafebreak.jpeg" },
    { name: "Cafe Dessert", price: 4, img: "../images/cafedessert.jpeg" },
    { name: "Cafe Sandwich", price: 7, img: "../images/cafesandwich.jpeg" },
    { name: "Latte", price: 5, img: "../images/latte.jpg" },
    { name: "Croissant", price: 4, img: "../images/croissant.png" },
    { name: "Muffin", price: 3, img: "../images/muffin.png" },
    { name: "Tea", price: 3, img: "../images/tea.png" },
    { name: "Cake Pop", price: 2, img: "../images/cakepop.png" },
    { name: "Salad", price: 4, img: "../images/salad.png" }
];

const container = document.getElementById("menu-grid");

menuItems.forEach(item => {
    const card = document.createElement("div");
    card.classList.add("menu-card");

    card.innerHTML = `
        <img src="${item.img}" alt="${item.name}">
        <h3>${item.name}</h3>
        <p>$${item.price}</p>
    `;

    container.appendChild(card);
});
</script>

</body>
</html>
