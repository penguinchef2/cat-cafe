<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Login</title>

    <link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
</head>

<body>
    <nav>
        <div class="nav-inner">
            <h1 class="logo">
                <a href="{{ url_for('home') }}">Cat Cafe</a>
            </h1>

            <ul>
                <li><a href="{{ url_for('about') }}">About</a></li>
                <li><a href="{{ url_for('menu') }}">Menu</a></li>
                <li><a href="{{ url_for('cats') }}">Cats</a></li>
                <li><a href="{{ url_for('reviews') }}" >Reviews</a></li>
                <li><a href="{{ url_for('login') }}" class="active">Sign In</a></li>
                <li><a href="{{ url_for('contact') }}">Contact</a></li>
                <li><a href="{{ url_for('application') }}">Application</a></li>

                {% if session.get('user') %}
                    <li class="welcome-user">
                        Welcome, {{ session['user'] }} 🐾
                    </li>
                    <li class="dropdown">
                        <a href="#">Account</a>
                        <div class="dropdown-content">
                            <a href="{{ url_for('logout') }}">Logout</a>
                        </div>
                    </li>
                {% endif %}
            </ul>
        </div>
    </nav>

    <h2 class="logintitle">Welcome Back 🐾</h2>
    <p class="subtitle">Login to continue your cat journey</p>

    <section class="form">

        <form id="formdata">

            <div class="field">
                <label>Email</label>
                <input type="text" id="email" name="email" class="box" placeholder="Enter your email">
            </div>

            <div class="field">
                <label>Password</label>
                <input type="password" id="password" name="password" class="box" placeholder="Enter your password">
            </div>

            <div class="field">
                <label>Confirm password</label>
                <input type="password" id="password" name="password" class="box" placeholder="Confirm password">
            </div>

            <button class="loginbtn">Login</button>

            <p class="registertext">
                Don't have an account?
                <a href="{{ url_for('register') }}">Register here</a>
            </p>

        </form>

    </section>

    <script>
        const form = document.getElementById("formdata");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const formData = new FormData(form);

            const res = await fetch("/login_send", {
                method: "POST",
                body: formData
            });

            const data = await res.json();

            if (data.success) {
                window.location.href = "/";
            } else {
                alert(data.message);
            }
        });
    </script>

</body>
</html>
